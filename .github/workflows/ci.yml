name: CI

on:
  push:
    branches: ["**"]
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to simulate (e.g. v1.0.0-test)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── fmt + clippy ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # ── core test matrix (Linux / macOS / Windows × stable / beta) ─────────────
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-${{ matrix.toolchain }}
      # Exclude the wasm feature on non-Linux runners — wasm32-unknown-unknown
      # is not available on macOS/Windows runners in the test matrix.
      - name: Test (Linux — all features)
        if: runner.os == 'Linux'
        run: cargo test --all-features
      - name: Test (macOS / Windows — no wasm)
        if: runner.os != 'Linux'
        run: cargo test --features serde,ffi

  # ── WASM build ──────────────────────────────────────────────────────────────
  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # No -D warnings here — wasm-bindgen generated code can trigger lints
      # outside our control.
      - run: cargo build --target wasm32-unknown-unknown --features wasm

  # ── docs ────────────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Exclude wasm feature — wasm-bindgen doc generation requires the wasm
      # target and can produce broken links on a native host.
      - run: cargo doc --features serde,ffi --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Build release binaries ──────────────────────────────────────────────────
  build-release:
    name: Build (${{ matrix.artifact }})
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bonsai-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: bonsai-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: bonsai-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bonsai-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI binary
        run: cargo build --release --features serde --target ${{ matrix.target }} --bin bonsai
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/bonsai ${{ matrix.artifact }}
      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/bonsai.exe ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish GitHub Release ──────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -lh artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Bonsai ${{ steps.tag.outputs.name }}
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: artifacts/*
